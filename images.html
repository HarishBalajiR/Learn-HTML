        <p>Below is an example of an image with proper attributes.</p>

        alt = "Chess.com Image"
        width = "1024"
        height = "512"
        >

        <p>If you were to see this image, you would see an image of the chess.com logo.</p>
        <p>If you were not able to see this image, you should see the text in the alt tag showing up.</p>
