<!DOCTYPE html>
<html>
    <head>
        <title>Tables in HTML</title>
    </head>
    <body>
        <h1>Tables in HTML</h1>
        <h2>What is a table?</h2>
        <ul>
            <li><b>A table contains rows and columns to store data.</b></li>
            <p></p>
            <li><b>Data can be better analyzed using tables</b></li>
        </ul>
        <table border="1">
            <tr>
                <th>Roll No</th>
                <th>Marks</th>
            </tr>
            <tr>
                <td>1</td>
                <td>99.9</td>
            </tr>
            <tr>
                <td>2</td>
                <td>0.1</td>
            </tr>
            <tr>
                <td>Total</td>
                <td>100</td>
            </tr>
        </table>
        <h1><a href="main.html">Go back to the main page</a></h1>
    </body>
</html>
